# Local deployment: `docker compose up --build`
# Web UI + API on http://localhost:3001 (SQLite + local file storage in the
# donna-data volume; demo workspace seeded on first boot).
#
# Optional profiles:
#   --profile postgres   run against Postgres instead of SQLite
#   --profile ollama     run a local Ollama for local LLM inference
services:
  donna:
    build: .
    ports:
      - "3001:3001"
    environment:
      DONNA_DATA_DIR: /data
      # The dedicated worker container handles scheduling — keep it off here.
      DONNA_INLINE_WORKER: "false"
      DONNA_SECRET: ${DONNA_SECRET:-change-me-in-production}
      DONNA_AUTH_MODE: ${DONNA_AUTH_MODE:-local}
      DONNA_DEMO_SEED: ${DONNA_DEMO_SEED:-true}
      # Auth / OAuth (docs/deployment.md + docs/auth.md). Defaults mirror the
      # server's own (apps/server/src/config.ts) so an empty shell var never
      # changes behavior.
      DONNA_PUBLIC_URL: ${DONNA_PUBLIC_URL:-http://localhost:3001}
      DONNA_COOKIE_SECURE: ${DONNA_COOKIE_SECURE:-false}
      DONNA_TRUST_PROXY: ${DONNA_TRUST_PROXY:-false}
      DONNA_ALLOW_SIGNUP: ${DONNA_ALLOW_SIGNUP:-true}
      DONNA_TOKEN_ENCRYPTION_KEY: ${DONNA_TOKEN_ENCRYPTION_KEY:-${DONNA_SECRET:-change-me-in-production}}
      DONNA_OWNER_EMAIL: ${DONNA_OWNER_EMAIL:-you@example.com}
      DONNA_OWNER_NAME: ${DONNA_OWNER_NAME:-Donna User}
      DONNA_OWNER_PASSWORD: ${DONNA_OWNER_PASSWORD:-}
      DONNA_WEB_ORIGIN: ${DONNA_WEB_ORIGIN:-http://localhost:5173}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      FACEBOOK_CLIENT_ID: ${FACEBOOK_CLIENT_ID:-}
      FACEBOOK_CLIENT_SECRET: ${FACEBOOK_CLIENT_SECRET:-}
      APPLE_CLIENT_ID: ${APPLE_CLIENT_ID:-}
      APPLE_TEAM_ID: ${APPLE_TEAM_ID:-}
      APPLE_KEY_ID: ${APPLE_KEY_ID:-}
      APPLE_PRIVATE_KEY: ${APPLE_PRIVATE_KEY:-}
      DATABASE_URL: ${DATABASE_URL:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      DONNA_LOCAL_LLM_BASE_URL: ${DONNA_LOCAL_LLM_BASE_URL:-}
      DONNA_LOCAL_LLM_MODEL: ${DONNA_LOCAL_LLM_MODEL:-}
    volumes:
      - donna-data:/data
    restart: unless-stopped

  worker:
    build: .
    command: ["pnpm", "--filter", "@donna/server", "worker"]
    environment:
      DONNA_DATA_DIR: /data
      DONNA_SECRET: ${DONNA_SECRET:-change-me-in-production}
      # The worker refreshes Google source tokens during scheduled syncs, so
      # it needs the token key + Google client credentials too.
      DONNA_TOKEN_ENCRYPTION_KEY: ${DONNA_TOKEN_ENCRYPTION_KEY:-${DONNA_SECRET:-change-me-in-production}}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      DATABASE_URL: ${DATABASE_URL:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      DONNA_LOCAL_LLM_BASE_URL: ${DONNA_LOCAL_LLM_BASE_URL:-}
      DONNA_LOCAL_LLM_MODEL: ${DONNA_LOCAL_LLM_MODEL:-}
    volumes:
      - donna-data:/data
    restart: unless-stopped
    depends_on:
      - donna

  postgres:
    image: postgres:16-alpine
    profiles: ["postgres"]
    environment:
      POSTGRES_DB: donna
      POSTGRES_USER: donna
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-donna}
    volumes:
      - donna-pg:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  ollama:
    image: ollama/ollama:latest
    profiles: ["ollama"]
    volumes:
      - donna-ollama:/root/.ollama
    ports:
      - "11434:11434"

volumes:
  donna-data:
  donna-pg:
  donna-ollama:
