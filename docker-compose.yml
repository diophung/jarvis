# Local deployment: `docker compose up --build`
# Web UI + API on http://localhost:3001 (SQLite + local file storage in the
# jarvis-data volume; demo workspace seeded on first boot).
#
# Optional profiles:
#   --profile postgres   run against Postgres instead of SQLite
#   --profile ollama     run a local Ollama for local LLM inference
services:
  jarvis:
    build: .
    ports:
      - "3001:3001"
    environment:
      JARVIS_DATA_DIR: /data
      # The dedicated worker container handles scheduling — keep it off here.
      JARVIS_INLINE_WORKER: "false"
      JARVIS_SECRET: ${JARVIS_SECRET:-change-me-in-production}
      JARVIS_AUTH_MODE: ${JARVIS_AUTH_MODE:-local}
      JARVIS_DEMO_SEED: ${JARVIS_DEMO_SEED:-true}
      # Auth / OAuth (docs/deployment.md + docs/auth.md). Defaults mirror the
      # server's own (apps/server/src/config.ts) so an empty shell var never
      # changes behavior.
      JARVIS_PUBLIC_URL: ${JARVIS_PUBLIC_URL:-http://localhost:3001}
      JARVIS_COOKIE_SECURE: ${JARVIS_COOKIE_SECURE:-false}
      JARVIS_TRUST_PROXY: ${JARVIS_TRUST_PROXY:-false}
      JARVIS_ALLOW_SIGNUP: ${JARVIS_ALLOW_SIGNUP:-true}
      JARVIS_TOKEN_ENCRYPTION_KEY: ${JARVIS_TOKEN_ENCRYPTION_KEY:-${JARVIS_SECRET:-change-me-in-production}}
      JARVIS_OWNER_EMAIL: ${JARVIS_OWNER_EMAIL:-you@example.com}
      JARVIS_OWNER_NAME: ${JARVIS_OWNER_NAME:-Jarvis User}
      JARVIS_OWNER_PASSWORD: ${JARVIS_OWNER_PASSWORD:-}
      JARVIS_WEB_ORIGIN: ${JARVIS_WEB_ORIGIN:-http://localhost:5173}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      FACEBOOK_CLIENT_ID: ${FACEBOOK_CLIENT_ID:-}
      FACEBOOK_CLIENT_SECRET: ${FACEBOOK_CLIENT_SECRET:-}
      APPLE_CLIENT_ID: ${APPLE_CLIENT_ID:-}
      APPLE_TEAM_ID: ${APPLE_TEAM_ID:-}
      APPLE_KEY_ID: ${APPLE_KEY_ID:-}
      APPLE_PRIVATE_KEY: ${APPLE_PRIVATE_KEY:-}
      DATABASE_URL: ${DATABASE_URL:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      JARVIS_LOCAL_LLM_BASE_URL: ${JARVIS_LOCAL_LLM_BASE_URL:-}
      JARVIS_LOCAL_LLM_MODEL: ${JARVIS_LOCAL_LLM_MODEL:-}
    volumes:
      - jarvis-data:/data
    restart: unless-stopped

  worker:
    build: .
    command: ["pnpm", "--filter", "@jarvis/server", "worker"]
    environment:
      JARVIS_DATA_DIR: /data
      JARVIS_SECRET: ${JARVIS_SECRET:-change-me-in-production}
      # The worker refreshes Google source tokens during scheduled syncs, so
      # it needs the token key + Google client credentials too.
      JARVIS_TOKEN_ENCRYPTION_KEY: ${JARVIS_TOKEN_ENCRYPTION_KEY:-${JARVIS_SECRET:-change-me-in-production}}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      DATABASE_URL: ${DATABASE_URL:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      JARVIS_LOCAL_LLM_BASE_URL: ${JARVIS_LOCAL_LLM_BASE_URL:-}
      JARVIS_LOCAL_LLM_MODEL: ${JARVIS_LOCAL_LLM_MODEL:-}
    volumes:
      - jarvis-data:/data
    restart: unless-stopped
    depends_on:
      - jarvis

  postgres:
    image: postgres:16-alpine
    profiles: ["postgres"]
    environment:
      POSTGRES_DB: jarvis
      POSTGRES_USER: jarvis
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-jarvis}
    volumes:
      - jarvis-pg:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  ollama:
    image: ollama/ollama:latest
    profiles: ["ollama"]
    volumes:
      - jarvis-ollama:/root/.ollama
    ports:
      - "11434:11434"

volumes:
  jarvis-data:
  jarvis-pg:
  jarvis-ollama:
